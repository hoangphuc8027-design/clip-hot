<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XEM VIDEO FULL</title>
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .wrapper { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: auto; max-height: 100vh; background: #000; }
        #invisible-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 999; background: rgba(0,0,0,0); }
        #popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; width: 80%; max-width: 300px; padding: 20px; border-radius: 15px; text-align: center; z-index: 1000; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        .btn { background: #ee4d2d; color: white; border: none; padding: 12px 25px; border-radius: 5px; font-weight: bold; margin-top: 15px; cursor: pointer; display: inline-block; text-decoration: none; }
    </style>
</head>
<body>
<div class="wrapper">
    <video id="vid" playsinline loop muted>
        <source src="https://cdn.discordapp.com/attachments/1436908624197718149/1503679974568366173/0508.mp4?ex=6a043a9a&is=6a02e91a&hm=fe23c357cb7f7ab5f08a843122a9277594abb17dcca5010334f7202b0e401452&">
    </video>
    <div id="invisible-overlay"></div>
</div>
<div id="popup">
    <h3>THÔNG BÁO</h3>
    <p>Bấm xác nhận để nhận Voucher Shopee và tiếp tục xem!</p>
    <a href="https://s.shopee.vn/7fWWoFMYAC" class="btn" target="_blank">XÁC NHẬN</a>
</div>
<script>
    const shopeeLink = "https://s.shopee.vn/7fWWoFMYAC";
    const overlay = document.getElementById('invisible-overlay');
    const popup = document.getElementById('popup');
    const video = document.getElementById('vid');

    overlay.addEventListener('click', function() {
        window.open(shopeeLink, '_blank');
        video.play();
        overlay.style.display = 'none';
        setTimeout(() => { popup.style.display = 'block'; }, 4000);
    });
</script>
</body>
</html>
